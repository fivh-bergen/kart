name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - uses: pnpm/action-setup@v4
        name: Setup pnpm
        with:
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 23
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Verify generated static assets
        run: |
          pnpm generate
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "::error::Generated files are out of date. Run 'pnpm generate' and commit the resulting changes."
            git status --short
            exit 1
          fi

      - name: Check formatting
        run: pnpm run format:check

      - name: Run unit tests
        run: pnpm run test

      - name: Run build script
        run: pnpm run build
